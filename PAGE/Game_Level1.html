<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Game Level 1 - Mengenal Huruf A-Z</title>
    <script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
	<link rel="preload" as="image" href="../IMAGE/BG_level1.jpg">

	<style>
		:root {
    --panel: rgba(255, 255, 255, 0.4);
    --panel-border: rgba(255, 255, 255, 0.65);
}
 
:root {
    --panel: rgba(255, 255, 255, 0.4);
    --panel-border: rgba(255, 255, 255, 0.65);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    min-height: 100vh;
    font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
    background-image:
        linear-gradient(
            rgba(255,255,255,0.12),
            rgba(255,255,255,0.18)
        ),
        url("../IMAGE/BG_level1.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    padding: 20px;

    display: flex;
    justify-content: center;
    align-items: center;
}

.game-wrap {
    width: min(1400px, 95%);

    background: var(--panel);
    border: 2px solid var(--panel-border);
    border-radius: 30px;

    padding: 30px;

    -webkit-backdrop-filter: blur(4px);
    backdrop-filter: blur(4px);

    box-shadow: 0 14px 34px rgba(0,0,0,0.18);

    animation: fadeIn 0.7s ease-out;
}

.top-bar {
    position: relative;

    display: flex;
    flex-direction: column;
    align-items: center;

    gap: 18px;
    margin-bottom: 35px;
}

.home-btn {
    position: absolute;
    top: 5%;
    right: 7%;

    text-decoration: none;

    padding: 20px 20px;

    border-radius: 999px;

    background: linear-gradient(
        180deg,
        #ffb347,
        #ff8c00
    );

    color: white;
    font-weight: 800;

    box-shadow:
        0 4px 0 #c96c00,
        0 8px 14px rgba(0,0,0,0.15);
}
h1 {
    font-size: clamp(2rem, 3vw, 3rem);

    color: #8b1010;

    background: rgba(255,255,255,0.78);

    padding: 14px 28px;

    border-radius: 999px;

    text-align: center;

    box-shadow: 0 5px 12px rgba(0,0,0,0.1);
}

.status {
    font-size: clamp(1rem, 2vw, 1.3rem);

    color: #1d3f19;

    background: rgba(240,255,240,0.85);

    padding: 12px 18px;

    border-radius: 14px;

    text-align: center;
}

.letters-grid {
    display: grid;

    grid-template-columns: repeat(6, minmax(140px, 1fr));

    gap: 20px;
}

.letter-btn {
    border: none;

    width: 100%;
    aspect-ratio: 1 / 1;

    border-radius: 50%;

    font-weight: 900;

    font-size: clamp(3rem, 6vw, 5rem);

    line-height: 1;

    cursor: pointer;

    box-shadow:
        0 7px 0 rgba(0,0,0,0.15),
        0 11px 17px rgba(0,0,0,0.2);

    transition:
        transform 0.12s ease,
        box-shadow 0.12s ease,
        filter 0.15s ease;

    opacity: 0;
    transform: translateY(22px) scale(0.94);

    animation: popUp 0.4s ease-out forwards;
}

.letter-btn:hover {
    filter: brightness(1.06);

    transform: translateY(-3px) scale(1.02);

    box-shadow:
        0 10px 0 rgba(0,0,0,0.13),
        0 16px 18px rgba(0,0,0,0.2);
}

.letter-btn:active,
.letter-btn.active {
    transform: translateY(4px) scale(0.97);

    box-shadow:
        0 2px 0 rgba(0,0,0,0.15),
        0 8px 12px rgba(0,0,0,0.18);
}

.actions {
    margin-top: 30px;

    display: flex;
    justify-content: center;
}

.back-link {
    text-decoration: none;

    display: inline-flex;
    align-items: center;
    gap: 10px;

    padding: 16px 32px;

    border-radius: 999px;

    font-size: 1.2rem;
    font-weight: 800;

    color: white;

    background: linear-gradient(
        180deg,
        #ffb347,
        #ff8c00
    );

    box-shadow:
        0 6px 0 #c96c00,
        0 12px 18px rgba(0,0,0,0.2);

    transition: all 0.15s ease;
}

.back-link:hover {
    transform: translateY(-3px);

    box-shadow:
        0 9px 0 #c96c00,
        0 16px 22px rgba(0,0,0,0.22);
}

.back-link:active {
    transform: translateY(4px);

    box-shadow:
        0 2px 0 #c96c00,
        0 8px 12px rgba(0,0,0,0.2);
}
@keyframes popUp {
    from {
        opacity: 0;
        transform: translateY(22px) scale(0.94);
    }

    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(14px) scale(0.98);
    }

    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@media (max-width: 1200px) {
    .letters-grid {
        grid-template-columns: repeat(5, 1fr);
    }
}

@media (max-width: 900px) {
    .letters-grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

@media (max-width: 600px) {
    body {
        padding: 12px;
    }

    .game-wrap {
        padding: 18px;
        border-radius: 20px;
    }

    .letters-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
    }

    h1 {
        font-size: 1.6rem;
    }

    .status {
        font-size: 0.95rem;
    }
}
	</style>
</head>
<body>
	
	<main class="game-wrap" aria-label="Permainan mengenal huruf A sampai Z">
		<header class="top-bar">
			<h1>Level 1 - Klik Huruf A-Z</h1>
			<p class="status" id="voiceStatus">Klik salah satu huruf untuk mendengarkan suaranya</p>
		</header>

		<section class="letters-grid" id="lettersGrid"></section>

		<div class="actions">
			<a class="home-btn" href="Dashboard.html">Kembali</a>
		</div>
	</main>
	<script type="module" src="../main.js"></script>
</body>
</html>
