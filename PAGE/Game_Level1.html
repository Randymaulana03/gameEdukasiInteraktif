<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Game Level 1 - Mengenal Huruf A-Z</title>
	<style>
		:root {
			--panel: rgba(255, 255, 255, 0.4);
			--panel-border: rgba(255, 255, 255, 0.65);
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			min-height: 100vh;
			font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
			background-image: linear-gradient(rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.18)), url("../IMAGE/BG_level1.png");
			background-size: cover;
			background-position: center;
			background-repeat: no-repeat;
			padding: 20px;
			display: flex;
			justify-content: center;
			align-items: center;
		}

		.game-wrap {
			width: min(1180px, 100%);
			background: var(--panel);
			border: 2px solid var(--panel-border);
			border-radius: 28px;
			padding: 18px;
			-webkit-backdrop-filter: blur(3px);
			backdrop-filter: blur(3px);
			box-shadow: 0 14px 34px rgba(0, 0, 0, 0.18);
			animation: fadeIn 0.7s ease-out;
		}

		.top-bar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			margin-bottom: 14px;
		}

		h1 {
			font-size: clamp(1.2rem, 2.4vw, 1.85rem);
			color: #8b1010;
			background: rgba(255, 255, 255, 0.66);
			padding: 10px 16px;
			border-radius: 999px;
		}

		.status {
			font-size: clamp(0.9rem, 1.8vw, 1rem);
			color: #1d3f19;
			background: rgba(240, 255, 240, 0.78);
			padding: 8px 12px;
			border-radius: 12px;
		}

		.letters-grid {
			display: grid;
			grid-template-columns: repeat(6, minmax(90px, 1fr));
			gap: 14px;
		}

		.letter-btn {
			border: none;
			width: 100%;
			aspect-ratio: 1 / 1;
			border-radius: 999px;
			font-weight: 900;
			font-size: clamp(2rem, 4vw, 3.1rem);
			line-height: 1;
			cursor: pointer;
			box-shadow: 0 7px 0 rgba(0, 0, 0, 0.15), 0 11px 17px rgba(0, 0, 0, 0.2);
			transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.15s ease;
			opacity: 0;
			transform: translateY(22px) scale(0.94);
			animation: popUp 0.4s ease-out forwards;
		}

		.letter-btn:hover {
			filter: brightness(1.06);
			transform: translateY(-3px) scale(1.02);
			box-shadow: 0 10px 0 rgba(0, 0, 0, 0.13), 0 16px 18px rgba(0, 0, 0, 0.2);
		}

		.letter-btn:active,
		.letter-btn.active {
			transform: translateY(4px) scale(0.97);
			box-shadow: 0 2px 0 rgba(0, 0, 0, 0.15), 0 8px 12px rgba(0, 0, 0, 0.18);
		}

		.actions {
			margin-top: 16px;
			display: flex;
			justify-content: center;
		}

		.back-link {
			text-decoration: none;
			padding: 10px 16px;
			border-radius: 10px;
			font-weight: 700;
			background: rgba(255, 255, 255, 0.8);
			color: #5c3900;
		}

		@keyframes popUp {
			from {
				opacity: 0;
				transform: translateY(22px) scale(0.94);
			}
			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(14px) scale(0.98);
			}
			to {
				opacity: 1;
				transform: translateY(0) scale(1);
			}
		}

		@media (max-width: 900px) {
			.letters-grid {
				grid-template-columns: repeat(5, minmax(78px, 1fr));
				gap: 12px;
			}
		}

		@media (max-width: 700px) {
			body {
				padding: 12px;
			}

			.game-wrap {
				padding: 12px;
				border-radius: 18px;
			}

			.top-bar {
				flex-direction: column;
				align-items: stretch;
			}

			.letters-grid {
				grid-template-columns: repeat(4, minmax(64px, 1fr));
				gap: 10px;
			}
		}
	</style>
</head>
<body>
	<main class="game-wrap" aria-label="Permainan mengenal huruf A sampai Z">
		<header class="top-bar">
			<h1>Level 1 - Klik Huruf A-Z</h1>
			<p class="status" id="voiceStatus">Klik salah satu huruf untuk mendengarkan suaranya</p>
		</header>

		<section class="letters-grid" id="lettersGrid"></section>

		<div class="actions">
			<a class="back-link" href="Dashboard.html">Kembali ke Dashboard</a>
		</div>
	</main>

	<script>
		const lettersGrid = document.getElementById('lettersGrid');
		const voiceStatus = document.getElementById('voiceStatus');
		let availableVoices = [];
		let preferredVoice = null;

		const bubbleStyles = [
			{ bg: '#e8a4b6', color: '#d7262d' },
			{ bg: '#81601d', color: '#2bc3ff' },
			{ bg: '#6ea1af', color: '#2b6f14' },
			{ bg: '#ff3a3a', color: '#1f6f15' },
			{ bg: '#a78fba', color: '#a3ffd0' },
			{ bg: '#1e2a72', color: '#ff7f8f' },
			{ bg: '#00d400', color: '#bff8ff' },
			{ bg: '#e400b5', color: '#d8ff4d' },
			{ bg: '#f50047', color: '#7ff0bf' },
			{ bg: '#67a44f', color: '#9af9c4' },
			{ bg: '#f8c100', color: '#ff5a63' },
			{ bg: '#9ec100', color: '#f6f68b' },
			{ bg: '#11c2c2', color: '#2c6f14' },
			{ bg: '#98b356', color: '#f7dfef' },
			{ bg: '#c2788a', color: '#6f1ca9' },
			{ bg: '#9de8df', color: '#0c0012' },
			{ bg: '#e4ef1f', color: '#2a5d17' },
			{ bg: '#d52f2f', color: '#d7d929' },
			{ bg: '#7aaeb8', color: '#ffe8f5' },
			{ bg: '#8a103a', color: '#e1ff2f' },
			{ bg: '#e33b75', color: '#040000' },
			{ bg: '#5f4732', color: '#f08ad7' },
			{ bg: '#e000aa', color: '#1443a3' },
			{ bg: '#12bfb8', color: '#001111' },
			{ bg: '#b39b73', color: '#eb00b5' },
			{ bg: '#ff3c3c', color: '#b8f179' }
		];

		function speakLetter(letter) {
			if (!('speechSynthesis' in window)) {
				voiceStatus.textContent = 'Browser ini belum mendukung suara otomatis.';
				return;
			}

			const voice = getPreferredVoice();
			window.speechSynthesis.cancel();
			const utterance = new SpeechSynthesisUtterance('Ini adalah huruf ' + letter  );
			utterance.lang = 'id-ID';
			utterance.rate = 0.72;
			utterance.pitch = 0.95;
			utterance.volume = 1;
			if (voice) {
				utterance.voice = voice;
				voiceStatus.textContent = 'Menggunakan suara: ' + voice.name + ' | Huruf yang dibaca: ' + letter;
			} else {
				voiceStatus.textContent = 'Huruf yang dibaca: ' + letter;
			}

			window.speechSynthesis.speak(utterance);
		}

		function loadVoices() {
			availableVoices = window.speechSynthesis.getVoices();
			preferredVoice = selectPreferredVoice(availableVoices);
		}

		function selectPreferredVoice(voices) {
			if (!voices || voices.length === 0) {
				return null;
			}

			const maleHints = ['male', 'man', 'boy', 'laki', 'lakik', 'pria', 'agus', 'budi', 'andi', 'arie', 'hendra', 'wahyu', 'dani', 'fajar', 'rudi', 'tono', 'dimas', 'rio'];

			const scored = voices.map((voice) => {
				const name = (voice.name || '').toLowerCase();
				const lang = (voice.lang || '').toLowerCase();
				let score = 0;

				if (lang.startsWith('id')) score += 70;
				else if (lang.includes('id')) score += 50;

				if (maleHints.some((hint) => name.includes(hint))) score += 80;
				if (name.includes('male')) score += 20;
				if (name.includes('google')) score += 5;
				if (name.includes('microsoft')) score += 5;

				if (lang.startsWith('en')) score += 5;

				return { voice, score };
			});

			scored.sort((a, b) => b.score - a.score);
			return scored[0].voice || voices[0] || null;
		}

		function getPreferredVoice() {
			if (preferredVoice) {
				return preferredVoice;
			}

			preferredVoice = selectPreferredVoice(availableVoices);
			return preferredVoice;
		}

		if ('speechSynthesis' in window) {
			loadVoices();
			window.speechSynthesis.onvoiceschanged = loadVoices;
		}

		for (let i = 0; i < 26; i += 1) {
			const upper = String.fromCharCode(65 + i);
			const lower = String.fromCharCode(97 + i);
			const style = bubbleStyles[i % bubbleStyles.length];

			const button = document.createElement('button');
			button.type = 'button';
			button.className = 'letter-btn';
			button.textContent = upper + lower;
			button.setAttribute('aria-label', 'Huruf ' + upper + ' dan huruf kecil ' + lower);
			button.style.backgroundColor = style.bg;
			button.style.color = style.color;
			button.style.animationDelay = (0.03 * i).toFixed(2) + 's';

			button.addEventListener('click', () => {
				button.classList.add('active');
				speakLetter(upper);

				setTimeout(() => {
					button.classList.remove('active');
				}, 180);
			});

			lettersGrid.appendChild(button);
		}
	</script>
</body>
</html>
