<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Level 2 - Menyusun Kata</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <link rel="preload" as="image" href="../IMAGE/BG_level1.jpg">

    <style>
        :root {
            --panel: rgba(255, 255, 255, 0.4);
            --panel-border: rgba(255, 255, 255, 0.65);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
            background-image: linear-gradient(rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.18)), url("../IMAGE/BG_level1.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-container {
            width: min(1200px, 100%);
            background: var(--panel);
            border: 2px solid var(--panel-border);
            border-radius: 28px;
            padding: 24px;
            -webkit-backdrop-filter: blur(3px);
            backdrop-filter: blur(3px);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.18);
            animation: fadeIn 0.7s ease-out;
        }

        .game-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .game-header h1 {
            font-size: clamp(1.4rem, 2.8vw, 2.2rem);
            color: #8b1010;
            background: rgba(255, 255, 255, 0.66);
            padding: 12px 20px;
            border-radius: 999px;
            display: inline-block;
        }

        .game-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: center;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(80px, 1fr));
            gap: 12px;
        }

        .letter {
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #E8A84C 0%, #D4924A 100%);
            color: #8b1010;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        .letter:hover {
            transform: scale(1.08);
            filter: brightness(1.08);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .letter.active {
            background: linear-gradient(135deg, #FF6B9D 0%, #FFC75F 100%);
            transform: scale(1.15);
            box-shadow: 0 10px 25px rgba(255, 107, 157, 0.3);
        }

        .letter.correct {
            background: linear-gradient(135deg, #00D4FF 0%, #0099FF 100%);
            animation: correctPulse 0.6s ease-out;
        }

        @keyframes correctPulse {
            0% { transform: scale(1.15); }
            50% { transform: scale(1.22); }
            100% { transform: scale(1.15); }
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 20px;
            min-height: 380px;
            backdrop-filter: blur(3px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .target-image {
            width: 100%;
            max-width: 280px;
            aspect-ratio: 1 / 1;
            background: rgba(200, 150, 100, 0.3);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #666;
            font-size: 12px;
        }

        .current-word {
            font-size: clamp(2.4rem, 5vw, 4rem);
            font-weight: 700;
            color: #1d3f19;
            text-align: center;
            background: rgba(240, 255, 240, 0.9);
            padding: 24px 36px;
            border-radius: 16px;
            min-width: 220px;
            letter-spacing: 3px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feedback {
            text-align: center;
            font-size: clamp(1rem, 2vw, 1.3rem);
            font-weight: bold;
            min-height: 30px;
            margin-top: 12px;
        }

        .feedback.correct { color: #00aa00; }
        .feedback.incorrect { color: #cc0000; }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            font-size: clamp(0.9rem, 1.8vw, 1rem);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            color: #5c3900;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        #nextBtn {
            display: none;
            background: rgba(100, 200, 255, 0.9);
            color: white;
        }

        #nextBtn.show { display: inline-block; }

        #lineCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        canvas.show { z-index: 10; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(14px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ===== NOTIFICATION MODAL ===== */
        .notification-overlay {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7); /* Background overlay dibuat sedikit lebih gelap agar fokus */
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .notification-overlay.show {
            display: flex;
            opacity: 1;
        }

        .notification-box {
            text-align: center;
            border-radius: 32px;
            padding: 30px;
            animation: notifyPop 0.38s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            
            /* Menggunakan background kaca (glassmorphism) yang serasi dengan game-container */
            background: rgba(255, 255, 255, 0.9); 
            /* border: 4px solid rgba(255, 255, 255, 1); */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);

            /* Ukuran Box yang proporsional dan pas untuk membungkus video */
            width: min(650px, 90vw); 
        }

        /* Aturan Box saat Benar (Seukuran game-container) */
        .notification-box.correct {
            width: min(1200px, 90vw);
            background: transparent;
            border: none;
            box-shadow: none;
            /* border-color: #0cb76a; */

        }

        /* Aturan Box saat Salah (Pop-up kecil proporsional) */
        .notification-box.incorrect {
            width: min(1200px, 90vw);
            background: transparent;
            /* border: none; */
            box-shadow: none;
            /* border-color: #0cb76a; */
        }

        .success-video, .fail-video {
            width: 100%;
            max-height: 100vh;
            object-fit: contain;
            border-radius: 20px;
            display: none;
            margin: 0 auto;
        }

        .notification-text {
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900;
            letter-spacing: 1px;
            margin-top: 16px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .notification-box.correct .notification-text {
            color: #0088cc;
        }

        .notification-box.incorrect .notification-text {
            color: #c50037;
        }

        @keyframes notifyPop {
            from { opacity: 0; transform: scale(0.88) translateY(-16px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media (max-width: 900px) {
            .game-content { grid-template-columns: 1fr; gap: 20px; }
            #grid { grid-template-columns: repeat(3, minmax(70px, 1fr)); }
            .right-panel { min-height: 250px; }
        }
    </style>
</head>

<body>
    <canvas id="lineCanvas"></canvas>

    <main class="game-container">
        <div class="game-header">
            <h1>Level 2 - Susun Kata</h1>
        </div>

        <div class="game-content">
            <div class="left-panel">
                <div id="grid"></div>
                <div class="feedback" id="feedback"></div>
            </div>

            <div class="right-panel">
                <div class="target-image">
                    <img id="targetImage" src="../IMAGE/atap.jpg" alt="Atap"
                        style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">
                </div>
                <div class="current-word" id="currentWord">_</div>
                <div class="controls">
                    <button id="resetBtn">Reset</button>
                    <button id="nextBtn">Next</button>
                </div>
            </div>
        </div>
    </main>

    <div class="notification-overlay" id="notificationOverlay">
        <div class="notification-box" id="notificationBox">
            
            <video id="successVideo" class="success-video" preload="auto" muted playsinline>
                <source src="../assets/gift/benar.webm" type="video/webm">
                <source src="../assets/gift/benar.mp4" type="video/mp4">
            </video>

            <video id="failVideo" class="fail-video" preload="auto" muted playsinline>
                <source src="../assets/gift/salah.webm" type="video/webm">
                <source src="../assets/gift/salah.mp4" type="video/mp4">
            </video>

            <div class="notification-text" id="notificationText"></div>
        </div>
    </div>

    <script type="module">
        import {
            wordsLevel2 as QUESTION_BANK,
            buildLevel2Matrix,
        } from "../core/words_Level2.js";
        import { startWord, addLetter, resetWord, getCurrentString, checkCurrentWord } from "../core/WordBuilder.js";
        import { playCorrectSound, playIncorrectSound } from "../core/AudioManager.js";

        let isDragging = false;
        let selected = [];
        let selectedEls = [];
        let lastEl = null;
        let isWordCorrect = false;
        let currentQuestionId = 1;
        let currentMatrix = [];
        let currentGridCols = 4;
        window.playCorrectSound = playCorrectSound;

        const grid = document.getElementById("grid");
        const canvas = document.getElementById("lineCanvas");
        const ctx = canvas.getContext("2d");
        const currentWordDisplay = document.getElementById("currentWord");
        const targetImage = document.getElementById("targetImage");
        const resetBtn = document.getElementById("resetBtn");
        const nextBtn = document.getElementById("nextBtn");
        const feedback = document.getElementById("feedback");

        // ===== NOTIFICATION ELEMENTS =====
        const notificationOverlay = document.getElementById("notificationOverlay");
        const notificationBox = document.getElementById("notificationBox");
        const notificationText = document.getElementById("notificationText");
        const successVideo = document.getElementById("successVideo");
        const failVideo = document.getElementById("failVideo");

        // ===== SHOW NOTIFICATION FUNCTION =====
        function showNotification(isCorrect) {
            // Stop dan sembunyikan semua video terlebih dahulu
            successVideo.pause();
            successVideo.style.display = "none";
            failVideo.pause();
            failVideo.style.display = "none";

            if (isCorrect) {
                notificationBox.className = "notification-box correct";
                successVideo.style.display = "block";
                
                successVideo.load();
                successVideo.currentTime = 0;
                successVideo.play();
                
                notificationText.textContent = "";
            } else {
                notificationBox.className = "notification-box incorrect";
                failVideo.style.display = "block";
                
                failVideo.load();
                failVideo.currentTime = 0;
                failVideo.play().catch(() => {
                    // Fallback jika file video salah tidak ditemukan/error
                    failVideo.style.display = "none";
                });

                // Memunculkan teks peringatan persis di bawah posisi video gagal
                // notificationText.textContent = "❌ COBA LAGI! ❌";
            }

            notificationOverlay.classList.add("show");

            // Otomatis menutup overlay setelah 2.5 detik
            setTimeout(() => {
                notificationOverlay.classList.remove("show");
                successVideo.pause();
                failVideo.pause();
            }, 2500);
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        function createLetterButton(letter) {
            const el = document.createElement("button");
            el.className = "letter";
            el.dataset.letter = letter;
            el.textContent = letter;
            el.type = "button";
            attachLetterHandlers(el);
            return el;
        }

        function getQuestionById(id) {
            return QUESTION_BANK.find((q) => q.id === id);
        }

        function flattenMatrix(matrix) {
            return matrix.flat();
        }

        function regenerateCurrentMatrix() {
            const q = getCurrentQuestion();
            const { matrix } = buildLevel2Matrix(q.answer, q.grid);
            currentMatrix = matrix;
            currentGridCols = q.grid?.cols || 4;
        }

        function renderGridForQuestion() {
            grid.innerHTML = "";
            grid.style.gridTemplateColumns = `repeat(${currentGridCols}, minmax(60px, 1fr))`;

            const layout = flattenMatrix(currentMatrix);
            layout.forEach((letter, index) => {
                const btn = createLetterButton(letter);
                btn.dataset.row = Math.floor(index / currentGridCols);
                btn.dataset.col = index % currentGridCols;
                grid.appendChild(btn);
            });
        }

        function getCurrentQuestion() {
            return getQuestionById(currentQuestionId);
        }

        function getNextQuestionId() {
            const sortedIds = QUESTION_BANK.map((q) => q.id).sort((a, b) => a - b);
            return sortedIds.find((id) => id > currentQuestionId);
        }

        function resetRoundState() {
            resetWord();
            isDragging = false;
            selected = [];
            selectedEls = [];
            lastEl = null;
            isWordCorrect = false;

            document.querySelectorAll(".letter").forEach((el) => {
                el.classList.remove("active", "correct");
            });

            clearCanvas();
            canvas.classList.remove("show");
            updateDisplay();
            nextBtn.classList.remove("show");
            clearFeedback();
        }

        function loadQuestionById(id) {
            resetWord();
            currentQuestionId = id;
            const q = getCurrentQuestion();
            targetImage.src = q.image;
            targetImage.alt = q.label;
            
            currentWordDisplay.textContent = q.label.toUpperCase(); 

            nextBtn.textContent = getNextQuestionId() ? "Soal Berikutnya" : "Level 3";
            regenerateCurrentMatrix();
            renderGridForQuestion();
            resetRoundState();
        }

        function attachLetterHandlers(el) {
            const letter = el.dataset.letter;

            el.addEventListener("mousedown", () => {
                isDragging = true;
                startWord(letter);
                selectedEls = [el];
                lastEl = el;
                isWordCorrect = false;

                el.classList.add("active");
                canvas.classList.add("show");

                updateDisplay();
                clearFeedback();
            });

            el.addEventListener("mouseenter", () => {
                if (!isDragging) return;
                if (lastEl === el) return;

                if (lastEl) {
                    const lastRow = parseInt(lastEl.dataset.row);
                    const lastCol = parseInt(lastEl.dataset.col);
                    const currentRow = parseInt(el.dataset.row);
                    const currentCol = parseInt(el.dataset.col);

                    const rowDiff = currentRow - lastRow;
                    const colDiff = currentCol - lastCol;

                    const validMove =
                        (rowDiff === 0 && Math.abs(colDiff) === 1) || 
                        (rowDiff === 1 && colDiff === 0) || 
                        (rowDiff === 1 && Math.abs(colDiff) === 1);

                    if (!validMove) return;
                }

                const isCorrect = addLetter(letter);
                selectedEls.push(el);

                if (lastEl) { drawLine(lastEl, el); }

                el.classList.add("active");
                lastEl = el;
                updateDisplay();

                if (isCorrect) {
                    isWordCorrect = true;
                    el.classList.add("correct");
                    feedback.textContent = "Benar!";
                    feedback.className = "feedback correct";
                    showNotification(true);
                    playCorrectSound();
                }
            });
        }

        document.addEventListener("mouseup", () => {
            if (!isDragging) return;

            isDragging = false;
            canvas.classList.remove("show");

            document.querySelectorAll(".letter").forEach((el) => {
                el.classList.remove("active");
            });

            if (isWordCorrect) {
                selectedEls.forEach((el) => { el.classList.add("correct"); });
                nextBtn.classList.add("show");
            } else {
                selectedEls = [];
                lastEl = null;
                clearCanvas();
                resetWord();
                updateDisplay();

                feedback.textContent = "❌ Coba lagi";
                feedback.className = "feedback incorrect";
                showNotification(false);
                playIncorrectSound();
            }
        });

        function drawLine(fromEl, toEl) {
            const r1 = fromEl.getBoundingClientRect();
            const r2 = toEl.getBoundingClientRect();
            const x1 = r1.left + r1.width / 2;
            const y1 = r1.top + r1.height / 2;
            const x2 = r2.left + r2.width / 2;
            const y2 = r2.top + r2.height / 2;

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = "#FFD700";
            ctx.lineWidth = 5;
            ctx.lineCap = "round";
            ctx.stroke();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function updateDisplay() {
            const displayStr = getCurrentString(); 
            const q = getCurrentQuestion();
            currentWordDisplay.textContent = displayStr || q.label.toUpperCase();
        }

        function clearFeedback() {
            feedback.textContent = "";
            feedback.className = "feedback";
        }

        resetBtn.addEventListener("click", () => {
            regenerateCurrentMatrix();
            resetRoundState();
            renderGridForQuestion();
        });

        nextBtn.addEventListener("click", () => {
            const nextId = getNextQuestionId();
            if (nextId) {
                loadQuestionById(nextId);
                return;
            }
            window.location.href = "Level3.html";
        });

        loadQuestionById(1);
    </script>
</body>
</html>
