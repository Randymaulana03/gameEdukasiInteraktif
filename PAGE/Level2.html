<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level 2 - Susun Kata</title>
  <style>
    :root {
      --pill: #e89cab;
      --text-red: #b9171d;
      --ray: #ff525a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Trebuchet MS", "Comic Sans MS", sans-serif;
      background-image: linear-gradient(rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.15)), url("../IMAGE/BG_Level.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .stage {
      width: min(980px, 95vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      transform: translateY(20px);
      animation: stageIn 0.8s ease-out forwards;
    }

    .ray-wrap {
      width: min(290px, 58vw);
      height: 76px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin-bottom: -8px;
      opacity: 0;
      animation: fadeUp 0.6s ease-out forwards;
      animation-delay: 0.2s;
    }

    .ray {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .ray span {
      position: absolute;
      width: 82px;
      height: 18px;
      border-radius: 999px;
      background: var(--ray);
      left: 50%;
      top: 50%;
      transform-origin: left center;
    }

    .ray span:nth-child(1) { transform: translate(-95px, 18px) rotate(-28deg); }
    .ray span:nth-child(2) { transform: translate(-68px, -10px) rotate(-11deg); }
    .ray span:nth-child(3) { transform: translate(-18px, -28px) rotate(-2deg); }
    .ray span:nth-child(4) { transform: translate(34px, -24px) rotate(9deg); width: 64px; }

    .pill {
      border-radius: 999px;
      background: var(--pill);
      color: var(--text-red);
      font-weight: 900;
      text-transform: uppercase;
      text-align: center;
      line-height: 1;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
      opacity: 0;
      transform: translateY(22px) scale(0.95);
      animation: fadeUp 0.65s ease-out forwards;
    }

    .pill.level {
      min-width: min(370px, 84vw);
      font-size: clamp(2.1rem, 6.4vw, 4.8rem);
      letter-spacing: 1px;
      padding: 24px 40px;
      animation-delay: 0.35s;
    }

    .pill.topic {
      width: min(840px, 92vw);
      font-size: clamp(1.9rem, 6vw, 5.1rem);
      padding: 26px 42px;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      text-transform: none;
      animation-delay: 0.55s;
    }

    .hint {
      margin-top: 8px;
      color: #ffffff;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 999px;
      padding: 8px 16px;
      font-size: clamp(0.9rem, 2.2vw, 1rem);
      opacity: 0;
      animation: fadeUp 0.65s ease-out forwards;
      animation-delay: 0.8s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes stageIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 640px) {
      .stage {
        gap: 14px;
      }

      .ray-wrap {
        width: min(240px, 64vw);
        height: 64px;
      }

      .ray span {
        width: 62px;
        height: 14px;
      }

      .ray span:nth-child(1) { transform: translate(-74px, 14px) rotate(-28deg); }
      .ray span:nth-child(2) { transform: translate(-52px, -7px) rotate(-11deg); }
      .ray span:nth-child(3) { transform: translate(-12px, -21px) rotate(-2deg); }
      .ray span:nth-child(4) { transform: translate(25px, -20px) rotate(9deg); width: 48px; }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Transisi ke permainan level 2">
    <div class="ray-wrap" aria-hidden="true">
      <div class="ray">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <section class="pill level">LEVEL 2</section>
    <section class="pill topic">Susun Kata</section>
    <p class="hint">Bersiap... permainan dimulai dalam 5 detik</p>
  </main>

  <script>
    setTimeout(() => {
      window.location.href = 'Game_Level2.html';
    }, 5000);
  </script>
</body>
</html>
